{% comment %}
Responsive image: serves webp (generated by `npm run thumbs`) with the
original as fallback. Wraps in a <figure> so post styles apply.

Usage:
  {% include image.html src="/img/foo.jpg" alt="A thing" %}
  {% include image.html src="/img/foo.png" alt="A thing" caption="Nice" class="img-splash" %}
  {% include image.html src="/img/hero.jpg" eager=true %}   (skip lazy-loading)
{% endcomment %}
{% assign _webp = include.src | replace: '.jpeg', '.webp' | replace: '.jpg', '.webp' | replace: '.png', '.webp' %}
<figure{% if include.class %} class="{{ include.class }}"{% endif %}>
  <picture>
    {% if _webp != include.src %}<source type="image/webp" srcset="{{ site.baseurl }}{{ _webp }}" />{% endif %}
    <img src="{{ site.baseurl }}{{ include.src }}" alt="{{ include.alt }}"{% unless include.eager %} loading="lazy"{% endunless %} decoding="async" />
  </picture>
  {% if include.caption %}<figcaption>{{ include.caption }}</figcaption>{% endif %}
</figure>
